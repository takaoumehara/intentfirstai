<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1456 1048" width="1456" height="1048">
  <defs>
    <linearGradient id="platformGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAED;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#D1D5DB;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="dialBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="dialOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:0.9"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1456" height="1048" fill="#F0F0EE"/>

  <!-- === LEFT SIDE: Person with privacy shield === -->

  <!-- Platform left -->
  <g transform="translate(250, 620)">
    <polygon points="0,0 140,-70 280,0 140,70" fill="url(#platformGrad)" stroke="#C9CDD3" stroke-width="1"/>
    <polygon points="0,0 0,24 140,94 140,70" fill="#D1D5DB" stroke="#C9CDD3" stroke-width="1"/>
    <polygon points="280,0 280,24 140,94 140,70" fill="#BCC1C8" stroke="#C9CDD3" stroke-width="1"/>
  </g>

  <!-- Person silhouette (standing, holding phone) -->
  <g transform="translate(370, 390)">
    <!-- Head -->
    <circle cx="0" cy="0" r="22" fill="#1A1A1A"/>
    <!-- Body -->
    <path d="M-18,22 L-22,120 L-8,120 L0,70 L8,120 L22,120 L18,22 Z" fill="#1A1A1A"/>
    <!-- Arms - one holding phone up -->
    <path d="M-18,35 L-40,80 L-32,82 L-14,45 Z" fill="#1A1A1A"/>
    <path d="M18,35 L36,55 L38,80 L30,80 L28,60 L14,45 Z" fill="#1A1A1A"/>
    <!-- Legs -->
    <path d="M-14,120 L-18,200 L-6,200 L-4,120 Z" fill="#1A1A1A"/>
    <path d="M4,120 L6,200 L18,200 L14,120 Z" fill="#1A1A1A"/>
    <!-- Phone in hand -->
    <rect x="28" y="55" width="16" height="26" rx="2" fill="#2563EB" stroke="#1D4ED8" stroke-width="1"/>
    <rect x="30" y="58" width="12" height="18" rx="1" fill="#93C5FD"/>
  </g>

  <!-- Privacy Shield (large, translucent) -->
  <g transform="translate(300, 340)" filter="url(#shadow)">
    <path d="M80,0 L160,30 L160,110 C160,160 120,200 80,220 C40,200 0,160 0,110 L0,30 Z" fill="url(#shieldGrad)" opacity="0.85"/>
    <path d="M80,0 L160,30 L160,110 C160,160 120,200 80,220 C40,200 0,160 0,110 L0,30 Z" fill="none" stroke="#1E40AF" stroke-width="2"/>
    <!-- Lock icon on shield -->
    <rect x="62" y="85" width="36" height="28" rx="4" fill="#F0F0EE" opacity="0.9"/>
    <path d="M68,85 L68,72 C68,60 92,60 92,72 L92,85" fill="none" stroke="#F0F0EE" stroke-width="4" opacity="0.9"/>
    <circle cx="80" cy="99" r="4" fill="#1E40AF"/>
    <rect x="78" y="102" width="4" height="6" fill="#1E40AF"/>
  </g>

  <!-- === CENTER: The Disclosure Dial mechanism === -->

  <!-- Central platform (elevated) -->
  <g transform="translate(580, 520)">
    <polygon points="0,0 150,-75 300,0 150,75" fill="url(#platformGrad)" stroke="#C9CDD3" stroke-width="1"/>
    <polygon points="0,0 0,30 150,105 150,75" fill="#D1D5DB" stroke="#C9CDD3" stroke-width="1"/>
    <polygon points="300,0 300,30 150,105 150,75" fill="#BCC1C8" stroke="#C9CDD3" stroke-width="1"/>
  </g>

  <!-- Dial base (isometric cylinder) -->
  <g transform="translate(730, 420)">
    <ellipse cx="0" cy="0" rx="120" ry="60" fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1"/>
  </g>

  <!-- Dial sectors - 4 disclosure levels -->
  <!-- Sector 1: Closed (dark) -->
  <g transform="translate(730, 420)">
    <path d="M0,0 L-120,0 A120,60 0 0,1 -85,-42 Z" fill="#374151" opacity="0.8"/>
    <!-- Sector 2: Minimal -->
    <path d="M0,0 L-85,-42 A120,60 0 0,1 0,-60 Z" fill="#2563EB" opacity="0.6"/>
    <!-- Sector 3: Selective -->
    <path d="M0,0 L0,-60 A120,60 0 0,1 85,-42 Z" fill="#2563EB" opacity="0.8"/>
    <!-- Sector 4: Open -->
    <path d="M0,0 L85,-42 A120,60 0 0,1 120,0 Z" fill="#D97706" opacity="0.85"/>
  </g>

  <!-- Dial pointer (orange, pointing to "Selective") -->
  <g transform="translate(730, 420)">
    <line x1="0" y1="0" x2="40" y2="-52" stroke="#D97706" stroke-width="5" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="10" fill="#D97706"/>
    <circle cx="0" cy="0" r="5" fill="#F59E0B"/>
  </g>

  <!-- Dial labels (floating) -->
  <!-- Closed -->
  <g transform="translate(600, 430)">
    <rect x="-36" y="-12" width="72" height="24" rx="12" fill="#374151" opacity="0.9"/>
    <text x="0" y="5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#FFF">Closed</text>
  </g>
  <!-- Minimal -->
  <g transform="translate(648, 370)">
    <rect x="-38" y="-12" width="76" height="24" rx="12" fill="#2563EB" opacity="0.7"/>
    <text x="0" y="5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#FFF">Minimal</text>
  </g>
  <!-- Selective -->
  <g transform="translate(770, 358)">
    <rect x="-42" y="-12" width="84" height="24" rx="12" fill="#2563EB" opacity="0.9"/>
    <text x="0" y="5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#FFF">Selective</text>
  </g>
  <!-- Open -->
  <g transform="translate(848, 388)">
    <rect x="-30" y="-12" width="60" height="24" rx="12" fill="#D97706"/>
    <text x="0" y="5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#FFF">Open</text>
  </g>

  <!-- === RIGHT SIDE: Domain cards floating === -->

  <!-- Domain card: Health (closed - dark) -->
  <g transform="translate(960, 280)" filter="url(#shadow)">
    <rect x="0" y="0" width="180" height="56" rx="8" fill="#FFF" stroke="#E5E7EB" stroke-width="1"/>
    <circle cx="28" cy="28" r="14" fill="#374151"/>
    <text x="28" y="33" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#FFF">+</text>
    <rect x="52" y="12" width="90" height="8" rx="4" fill="#E5E7EB"/>
    <rect x="52" y="28" width="60" height="6" rx="3" fill="#F3F4F6"/>
    <rect x="150" y="16" width="20" height="20" rx="4" fill="#374151" opacity="0.2"/>
    <path d="M155,26 L165,26 M160,21 L160,31" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Domain card: Music (open - orange) -->
  <g transform="translate(980, 370)" filter="url(#shadow)">
    <rect x="0" y="0" width="180" height="56" rx="8" fill="#FFF" stroke="#F59E0B" stroke-width="2"/>
    <circle cx="28" cy="28" r="14" fill="#D97706"/>
    <text x="28" y="33" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#FFF">&#9835;</text>
    <rect x="52" y="12" width="90" height="8" rx="4" fill="#FEF3C7"/>
    <rect x="52" y="28" width="60" height="6" rx="3" fill="#FEF9C3"/>
    <rect x="150" y="16" width="20" height="20" rx="4" fill="#D97706" opacity="0.2"/>
    <path d="M156,22 L164,26 L156,30" fill="#D97706"/>
  </g>

  <!-- Domain card: Food (selective - blue) -->
  <g transform="translate(950, 460)" filter="url(#shadow)">
    <rect x="0" y="0" width="180" height="56" rx="8" fill="#FFF" stroke="#2563EB" stroke-width="2"/>
    <circle cx="28" cy="28" r="14" fill="#2563EB"/>
    <text x="28" y="34" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#FFF">&#127860;</text>
    <rect x="52" y="12" width="90" height="8" rx="4" fill="#DBEAFE"/>
    <rect x="52" y="28" width="60" height="6" rx="3" fill="#EFF6FF"/>
    <rect x="150" y="16" width="20" height="20" rx="4" fill="#2563EB" opacity="0.2"/>
    <circle cx="160" cy="26" r="4" fill="none" stroke="#2563EB" stroke-width="1.5"/>
    <path d="M158,26 L162,26" stroke="#2563EB" stroke-width="1.5"/>
  </g>

  <!-- === Connecting lines (thin, dashed) === -->
  <!-- From shield to dial -->
  <line x1="470" y1="440" x2="610" y2="420" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.4"/>

  <!-- From dial to domain cards -->
  <line x1="850" y1="400" x2="960" y2="310" stroke="#374151" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>
  <line x1="850" y1="415" x2="980" y2="398" stroke="#D97706" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="850" y1="430" x2="950" y2="488" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- === Per-person indicators (family) === -->
  <!-- Small person icons at bottom showing "different per person" -->
  <g transform="translate(540, 680)">
    <!-- Person 1 (Father) - larger -->
    <circle cx="0" cy="0" r="12" fill="#1A1A1A"/>
    <rect x="-8" y="14" width="16" height="20" rx="3" fill="#1A1A1A"/>
    <!-- Small dial indicator -->
    <circle cx="22" cy="5" r="8" fill="#2563EB" opacity="0.7"/>
  </g>
  <g transform="translate(600, 680)">
    <!-- Person 2 (Mother) -->
    <circle cx="0" cy="0" r="11" fill="#1A1A1A"/>
    <rect x="-7" y="13" width="14" height="18" rx="3" fill="#1A1A1A"/>
    <circle cx="20" cy="5" r="8" fill="#D97706" opacity="0.7"/>
  </g>
  <g transform="translate(655, 680)">
    <!-- Person 3 (Child) - smaller -->
    <circle cx="0" cy="0" r="9" fill="#1A1A1A"/>
    <rect x="-6" y="11" width="12" height="14" rx="3" fill="#1A1A1A"/>
    <circle cx="17" cy="4" r="8" fill="#374151" opacity="0.5"/>
  </g>

  <!-- Caption arrow: "Per person, per domain" -->
  <path d="M540,730 C580,750 620,750 660,730" fill="none" stroke="#D97706" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <defs>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#D97706"/>
    </marker>
  </defs>

  <!-- Bottom right subtle logo mark -->
  <circle cx="1410" cy="1010" r="12" fill="#1A1A1A" opacity="0.15"/>

</svg>
