<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1456 1048" width="1456" height="1048">
  <defs>
    <linearGradient id="platGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8EAED"/>
      <stop offset="100%" style="stop-color:#D1D5DB"/>
    </linearGradient>
    <linearGradient id="blueG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
    <linearGradient id="orangeG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#D97706"/>
    </linearGradient>
    <linearGradient id="darkG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#374151"/>
      <stop offset="100%" style="stop-color:#1F2937"/>
    </linearGradient>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#6D28D9"/>
    </linearGradient>
    <filter id="sh" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="1" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <marker id="arrB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563EB"/>
    </marker>
    <marker id="arrO" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#D97706"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#6B7280"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1456" height="1048" fill="#F0F0EE"/>

  <!-- ========== TOP: INTENT ========== -->
  <g transform="translate(728, 80)">
    <!-- Intent diamond -->
    <polygon points="0,-36 50,0 0,36 -50,0" fill="url(#orangeG)" filter="url(#sh)"/>
    <text x="0" y="6" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#FFF">Intent</text>
  </g>
  <!-- Implicit/Explicit labels -->
  <text x="650" y="68" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#9CA3AF" font-style="italic">明示的 Explicit</text>
  <text x="806" y="68" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#9CA3AF" font-style="italic">暗黙的 Implicit</text>
  <!-- Arrow from Intent down -->
  <line x1="728" y1="118" x2="728" y2="165" stroke="#D97706" stroke-width="2" marker-end="url(#arrO)"/>

  <!-- ========== ROW 1: 6 Situation Tokens ========== -->
  <!-- Section label -->
  <text x="120" y="210" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#6B7280" letter-spacing="2">状況を読む TOKEN</text>
  <line x1="120" y1="218" x2="340" y2="218" stroke="#D1D5DB" stroke-width="1"/>

  <!-- Token 1: Physical State -->
  <g transform="translate(200, 278)" filter="url(#sh)">
    <rect x="-72" y="-34" width="144" height="68" rx="10" fill="#FFF" stroke="#2563EB" stroke-width="2"/>
    <circle cx="-40" cy="0" r="16" fill="url(#blueG)"/>
    <text x="-40" y="2" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFF">①</text>
    <text x="14" y="-8" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1F2937">Physical</text>
    <text x="14" y="10" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1F2937">State</text>
  </g>

  <!-- Token 2: Cognitive Load -->
  <g transform="translate(400, 278)" filter="url(#sh)">
    <rect x="-72" y="-34" width="144" height="68" rx="10" fill="#FFF" stroke="#2563EB" stroke-width="2"/>
    <circle cx="-40" cy="0" r="16" fill="url(#blueG)"/>
    <text x="-40" y="2" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFF">②</text>
    <text x="14" y="-8" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1F2937">Cognitive</text>
    <text x="14" y="10" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1F2937">Load</text>
  </g>

  <!-- Token 3: Social Exposure -->
  <g transform="translate(600, 278)" filter="url(#sh)">
    <rect x="-72" y="-34" width="144" height="68" rx="10" fill="#FFF" stroke="#2563EB" stroke-width="2"/>
    <circle cx="-40" cy="0" r="16" fill="url(#blueG)"/>
    <text x="-40" y="2" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFF">③</text>
    <text x="14" y="-8" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1F2937">Social</text>
    <text x="14" y="10" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1F2937">Exposure</text>
  </g>

  <!-- Token 4: Priority Weight -->
  <g transform="translate(800, 278)" filter="url(#sh)">
    <rect x="-72" y="-34" width="144" height="68" rx="10" fill="#FFF" stroke="#2563EB" stroke-width="2"/>
    <circle cx="-40" cy="0" r="16" fill="url(#blueG)"/>
    <text x="-40" y="2" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFF">④</text>
    <text x="14" y="-8" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1F2937">Priority</text>
    <text x="14" y="10" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1F2937">Weight</text>
  </g>

  <!-- Token 5: Form Factor -->
  <g transform="translate(1000, 278)" filter="url(#sh)">
    <rect x="-72" y="-34" width="144" height="68" rx="10" fill="#FFF" stroke="#2563EB" stroke-width="2"/>
    <circle cx="-40" cy="0" r="16" fill="url(#blueG)"/>
    <text x="-40" y="2" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFF">⑤</text>
    <text x="14" y="-8" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1F2937">Form</text>
    <text x="14" y="10" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1F2937">Factor</text>
  </g>

  <!-- Token 6: Feasibility -->
  <g transform="translate(1200, 278)" filter="url(#sh)">
    <rect x="-72" y="-34" width="144" height="68" rx="10" fill="#FFF" stroke="#2563EB" stroke-width="2"/>
    <circle cx="-40" cy="0" r="16" fill="url(#blueG)"/>
    <text x="-40" y="2" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFF">⑥</text>
    <text x="14" y="-4" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1F2937">Feasibility</text>
  </g>

  <!-- Bracket under 6 tokens -->
  <path d="M128,330 L128,350 L1272,350 L1272,330" fill="none" stroke="#2563EB" stroke-width="1.5" opacity="0.3"/>
  <line x1="700" y1="350" x2="700" y2="385" stroke="#2563EB" stroke-width="1.5" opacity="0.3" marker-end="url(#arrB)"/>

  <!-- ========== ROW 2: 2 Relationship Dials ========== -->
  <!-- Section label -->
  <text x="120" y="430" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#92400E" letter-spacing="2">関係を制御する DIAL</text>
  <line x1="120" y1="438" x2="340" y2="438" stroke="#FCD34D" stroke-width="1"/>

  <!-- Token 7: Autonomy Dial -->
  <g transform="translate(520, 498)" filter="url(#sh)">
    <rect x="-110" y="-40" width="220" height="80" rx="12" fill="#FFF" stroke="#D97706" stroke-width="2.5"/>
    <circle cx="-72" cy="0" r="20" fill="url(#orangeG)"/>
    <text x="-72" y="2" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#FFF">⑦</text>
    <text x="10" y="-10" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#92400E">Autonomy Dial</text>
    <text x="10" y="10" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#9CA3AF">どこまで任せるか</text>
    <!-- Mini dial icon -->
    <g transform="translate(78, 0)">
      <path d="M-12,0 A12,12 0 0,1 12,0" fill="none" stroke="#D97706" stroke-width="2"/>
      <line x1="0" y1="0" x2="5" y2="-10" stroke="#D97706" stroke-width="2" stroke-linecap="round"/>
      <circle cx="0" cy="0" r="2" fill="#D97706"/>
    </g>
  </g>

  <!-- Token 8: Disclosure Dial -->
  <g transform="translate(920, 498)" filter="url(#sh)">
    <rect x="-110" y="-40" width="220" height="80" rx="12" fill="#FFF" stroke="#D97706" stroke-width="2.5"/>
    <circle cx="-72" cy="0" r="20" fill="url(#orangeG)"/>
    <text x="-72" y="2" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#FFF">⑧</text>
    <text x="10" y="-10" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#92400E">Disclosure Dial</text>
    <text x="10" y="10" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#9CA3AF">どこまで知らせるか</text>
    <!-- Shield icon -->
    <g transform="translate(78, -2)">
      <path d="M0,-12 L10,-6 L10,4 C10,10 5,14 0,16 C-5,14 -10,10 -10,4 L-10,-6 Z" fill="none" stroke="#D97706" stroke-width="2"/>
      <circle cx="0" cy="2" r="2" fill="#D97706"/>
    </g>
  </g>

  <!-- Prerequisite arrow: ⑧ → ⑦ -->
  <path d="M810,498 L715,498" fill="none" stroke="#D97706" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrO)"/>
  <text x="762" y="488" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#D97706" font-style="italic">前提条件</text>

  <!-- 3 Forces annotation -->
  <g transform="translate(520, 568)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="9" fill="#9CA3AF">3つの力: サービスのデフォルト × AIの察知 × ユーザーの能動的変更</text>
  </g>

  <!-- ========== ROW 3: Brain ========== -->
  <!-- Arrow from Tokens+Dials to Brain -->
  <line x1="728" y1="555" x2="728" y2="610" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrG)"/>

  <g transform="translate(728, 665)" filter="url(#sh)">
    <rect x="-180" y="-38" width="360" height="76" rx="14" fill="#FFF" stroke="#7C3AED" stroke-width="2"/>
    <!-- Brain icon -->
    <circle cx="-140" cy="0" r="22" fill="url(#brainGrad)"/>
    <path d="M-148,-6 C-148,-14 -140,-16 -140,-12 C-140,-16 -132,-14 -132,-6" fill="none" stroke="#FFF" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M-148,2 C-150,8 -144,12 -140,8 C-136,12 -130,8 -132,2" fill="none" stroke="#FFF" stroke-width="1.5" stroke-linecap="round"/>
    <text x="-30" y="-12" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#4C1D95">Brain</text>
    <text x="-30" y="8" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7C3AED">Identity × Learning × Right Now</text>
    <!-- 3 layer dots -->
    <circle cx="118" cy="-14" r="6" fill="#7C3AED" opacity="0.4"/>
    <circle cx="118" cy="0" r="6" fill="#7C3AED" opacity="0.65"/>
    <circle cx="118" cy="14" r="6" fill="#7C3AED" opacity="0.9"/>
  </g>

  <!-- ========== ROW 4: Rule Engine ========== -->
  <line x1="728" y1="705" x2="728" y2="755" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrG)"/>

  <g transform="translate(728, 800)" filter="url(#sh)">
    <rect x="-130" y="-30" width="260" height="60" rx="10" fill="url(#darkG)"/>
    <text x="0" y="-4" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#FFF">Rule Engine</text>
    <text x="0" y="14" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#9CA3AF">Token → Design Rule</text>
  </g>

  <!-- ========== ROW 5: Experience ========== -->
  <line x1="728" y1="832" x2="728" y2="870" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arrG)"/>

  <g transform="translate(728, 910)" filter="url(#sh)">
    <rect x="-160" y="-28" width="320" height="56" rx="28" fill="#FFF" stroke="#2563EB" stroke-width="2"/>
    <text x="0" y="6" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1D4ED8">あなたの「今」に合った体験</text>
  </g>

  <!-- ========== Learning Loop (right side, curved arrow back up) ========== -->
  <path d="M1050,910 L1120,910 L1120,665 L950,665" fill="none" stroke="#D97706" stroke-width="1.5" stroke-dasharray="8,4" marker-end="url(#arrO)" opacity="0.5"/>
  <text x="1138" y="790" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#D97706" opacity="0.7" transform="rotate(-90, 1138, 790)">Learning Loop → Brain</text>

</svg>
