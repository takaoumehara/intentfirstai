<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Three diagonal lines with a branching node -->
  <g stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top line -->
    <line x1="30" y1="15" x2="105" y2="90"/>
    <!-- Middle line with branch -->
    <path d="M15 45 L50 80 L55 75"/>
    <path d="M55 75 L90 40"/>
    <line x1="55" y1="75" x2="90" y2="110"/>
    <!-- Bottom line -->
    <line x1="15" y1="70" x2="60" y2="115"/>
  </g>
  <!-- Node dot -->
  <circle cx="55" cy="75" r="4" fill="#ffffff"/>
</svg>
