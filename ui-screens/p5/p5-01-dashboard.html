<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P5-01 Unified Agent Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Noto Sans JP', system-ui, sans-serif;
    padding: 20px;
  }

  .phone-frame {
    width: 390px;
    height: 844px;
    background: #000;
    border-radius: 44px;
    padding: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    overflow: hidden;
    position: relative;
  }

  .phone-frame::before {
    content: '';
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 28px;
    background: #000;
    border-radius: 0 0 16px 16px;
    z-index: 10;
  }

  .phone-screen {
    width: 100%;
    height: 100%;
    background: #fdfcfa;
    border-radius: 34px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .phone-content {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
  }

  .phone-content::-webkit-scrollbar { display: none; }

  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 16px;
    font-size: 12px;
    color: #1a1816;
    background: #fdfcfa;
    padding-top: 16px;
  }

  .header {
    padding: 12px 16px 8px;
    background: #fdfcfa;
    border-bottom: 1px solid #f0ece4;
    position: sticky;
    top: 0;
    z-index: 5;
  }

  .header-title {
    font-size: 16px;
    font-weight: 600;
    color: #1a1816;
  }

  .header-subtitle {
    font-size: 12px;
    color: #8a8580;
    margin-top: 2px;
  }

  .content {
    padding: 12px 12px 20px;
  }

  /* ── Agent Cards ── */
  .agent-card {
    background: #fff;
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 12px;
    border: 1px solid #f0ece4;
    position: relative;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .agent-card:active {
    transform: scale(0.98);
    background: #f8f7f4;
  }

  .agent-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .agent-name {
    font-size: 14px;
    font-weight: 600;
    color: #1a1816;
  }

  .agent-status-badge {
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 10px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .agent-status-badge.completed {
    background: #ecfdf5;
    color: #065f46;
  }

  .agent-status-badge.running {
    background: #fef3e0;
    color: #92400e;
  }

  .agent-status-badge.error {
    background: #fef2f2;
    color: #b91c1c;
  }

  /* Status icons */
  .status-icon {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .status-icon.completed { background: #065f46; }
  .status-icon.running { background: #92400e; }
  .status-icon.error { background: #b91c1c; }

  /* Progress/detail line */
  .agent-detail {
    font-size: 12px;
    color: #8a8580;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .agent-detail-text {
    flex: 1;
  }

  .detail-icon {
    font-size: 14px;
  }

  /* Progress bar for running agents */
  .progress-bar {
    height: 6px;
    background: #f0ece4;
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 8px;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #d97706, #fbbf24);
    border-radius: 3px;
    transition: width 0.3s ease;
  }

  .progress-label {
    font-size: 10px;
    color: #8a8580;
    text-align: right;
    margin-top: 2px;
  }

  /* Task count */
  .task-count {
    font-size: 13px;
    font-weight: 600;
    color: #1a1816;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .checkmark {
    display: inline-block;
    color: #065f46;
  }

  /* Spinner animation for running */
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .spinner {
    display: inline-block;
    animation: spin 1.5s linear infinite;
  }

  .warning-icon {
    display: inline-block;
    color: #b91c1c;
  }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="phone-screen">
    <div class="status-bar">
      <span>9:00</span>
      <span style="font-weight: 600;">●●●●●</span>
    </div>

    <div class="header">
      <div class="header-title">3つのエージェント</div>
      <div class="header-subtitle">朝の状況を一目で把握</div>
    </div>

    <div class="phone-content">
      <div class="content">
        <!-- Sales Agent - Completed -->
        <div class="agent-card">
          <div class="agent-header">
            <div class="agent-name">営業エージェント</div>
            <div class="agent-status-badge completed">
              <span class="status-icon completed"></span>
              <span>完了</span>
            </div>
          </div>
          <div class="agent-detail">
            <span class="detail-icon">✓</span>
            <span class="agent-detail-text">すべてのタスク完了</span>
          </div>
          <div class="task-count">
            <span class="checkmark">✓</span>
            <span>5/5 タスク完了</span>
          </div>
        </div>

        <!-- Research Agent - Running -->
        <div class="agent-card">
          <div class="agent-header">
            <div class="agent-name">リサーチエージェント</div>
            <div class="agent-status-badge running">
              <span class="status-icon running"></span>
              <span>実行中</span>
            </div>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" style="width: 68%;"></div>
          </div>
          <div class="progress-label">68% 完了</div>
          <div class="agent-detail">
            <span class="detail-icon spinner">⟳</span>
            <span class="agent-detail-text">競合分析実行中</span>
          </div>
        </div>

        <!-- Admin Agent - Error -->
        <div class="agent-card">
          <div class="agent-header">
            <div class="agent-name">管理エージェント</div>
            <div class="agent-status-badge error">
              <span class="status-icon error"></span>
              <span>エラー</span>
            </div>
          </div>
          <div class="agent-detail">
            <span class="detail-icon warning-icon">⚠</span>
            <span class="agent-detail-text">会議室予約に失敗</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
