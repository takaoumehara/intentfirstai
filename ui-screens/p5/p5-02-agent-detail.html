<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P5-02 Agent Detail View</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Noto Sans JP', system-ui, sans-serif;
    padding: 20px;
  }

  .phone-frame {
    width: 390px;
    height: 844px;
    background: #000;
    border-radius: 44px;
    padding: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    overflow: hidden;
    position: relative;
  }

  .phone-frame::before {
    content: '';
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 28px;
    background: #000;
    border-radius: 0 0 16px 16px;
    z-index: 10;
  }

  .phone-screen {
    width: 100%;
    height: 100%;
    background: #fdfcfa;
    border-radius: 34px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .phone-content {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
  }

  .phone-content::-webkit-scrollbar { display: none; }

  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 16px;
    font-size: 12px;
    color: #1a1816;
    background: #fdfcfa;
    padding-top: 16px;
  }

  .header {
    padding: 12px 16px 8px;
    background: #fdfcfa;
    border-bottom: 1px solid #f0ece4;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .back-btn {
    font-size: 18px;
    cursor: pointer;
    color: #1a1816;
  }

  .header-text {
    flex: 1;
  }

  .header-title {
    font-size: 16px;
    font-weight: 600;
    color: #1a1816;
  }

  .header-subtitle {
    font-size: 12px;
    color: #8a8580;
    margin-top: 1px;
  }

  .content {
    padding: 16px 12px 20px;
  }

  .section {
    margin-bottom: 18px;
  }

  .section-title {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    color: #8a8580;
    margin-bottom: 10px;
    letter-spacing: 0.5px;
  }

  /* Task item */
  .task-item {
    background: #fff;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 8px;
    border: 1px solid #f0ece4;
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }

  .task-checkbox {
    width: 20px;
    height: 20px;
    border-radius: 6px;
    background: #ecfdf5;
    border: 1px solid #a7f3d0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    color: #065f46;
    font-size: 12px;
    font-weight: 600;
  }

  .task-content {
    flex: 1;
  }

  .task-name {
    font-size: 13px;
    font-weight: 600;
    color: #1a1816;
    margin-bottom: 2px;
  }

  .task-detail {
    font-size: 11px;
    color: #8a8580;
  }

  /* Performance row */
  .perf-row {
    background: #fff;
    border-radius: 12px;
    padding: 12px;
    border: 1px solid #f0ece4;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .perf-label {
    font-size: 12px;
    color: #8a8580;
  }

  .perf-value {
    font-size: 14px;
    font-weight: 600;
    color: #1a1816;
    font-family: 'IBM Plex Mono', monospace;
  }

  /* Autonomy Dial */
  .dial-section {
    background: #fff;
    border-radius: 12px;
    padding: 14px;
    border: 1px solid #f0ece4;
  }

  .dial-label {
    font-size: 12px;
    color: #8a8580;
    margin-bottom: 8px;
    font-weight: 600;
  }

  .dial-stages {
    display: flex;
    gap: 2px;
    margin-bottom: 10px;
  }

  .dial-stage {
    flex: 1;
    height: 24px;
    border-radius: 6px;
    background: #f0ece4;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 600;
    color: #8a8580;
    transition: all 0.3s ease;
  }

  .dial-stage.active {
    background: #6889b4;
    color: #fff;
  }

  .dial-description {
    font-size: 11px;
    color: #8a8580;
    line-height: 1.4;
  }

  /* Next action */
  .next-action {
    background: #f8f7f4;
    border-radius: 12px;
    padding: 12px;
    border: 1px solid #f0ece4;
  }

  .next-action-time {
    font-size: 13px;
    font-weight: 600;
    color: #1a1816;
    margin-bottom: 4px;
  }

  .next-action-detail {
    font-size: 12px;
    color: #8a8580;
  }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="phone-screen">
    <div class="status-bar">
      <span>9:15</span>
      <span style="font-weight: 600;">●●●●●</span>
    </div>

    <div class="header">
      <div class="back-btn">←</div>
      <div class="header-text">
        <div class="header-title">営業エージェント</div>
        <div class="header-subtitle">完了 • 信頼度 94%</div>
      </div>
    </div>

    <div class="phone-content">
      <div class="content">
        <!-- Current Tasks -->
        <div class="section">
          <div class="section-title">今日のタスク</div>

          <div class="task-item">
            <div class="task-checkbox">✓</div>
            <div class="task-content">
              <div class="task-name">Lead A プレゼン準備</div>
              <div class="task-detail">完了 09:00</div>
            </div>
          </div>

          <div class="task-item">
            <div class="task-checkbox">✓</div>
            <div class="task-content">
              <div class="task-name">フォローアップメール送信</div>
              <div class="task-detail">完了 08:45 (28通)</div>
            </div>
          </div>

          <div class="task-item">
            <div class="task-checkbox">✓</div>
            <div class="task-content">
              <div class="task-name">顧客提案書レビュー</div>
              <div class="task-detail">完了 08:30</div>
            </div>
          </div>
        </div>

        <!-- Performance Metrics -->
        <div class="section">
          <div class="section-title">パフォーマンス</div>

          <div class="perf-row">
            <span class="perf-label">平均応答時間</span>
            <span class="perf-value">2.3分</span>
          </div>

          <div class="perf-row">
            <span class="perf-label">成功率</span>
            <span class="perf-value">94%</span>
          </div>

          <div class="perf-row">
            <span class="perf-label">本日の処理件数</span>
            <span class="perf-value">12件</span>
          </div>
        </div>

        <!-- Autonomy Dial -->
        <div class="section">
          <div class="dial-section">
            <div class="dial-label">自律度ダイアル設定</div>
            <div class="dial-stages">
              <div class="dial-stage">提案</div>
              <div class="dial-stage active">確認</div>
              <div class="dial-stage">通知</div>
              <div class="dial-stage">自動</div>
            </div>
            <div class="dial-description">現在は「確認」レベル。AIが判断し、大きな決定時は人間が確認します。</div>
          </div>
        </div>

        <!-- Next Action -->
        <div class="section">
          <div class="section-title">次のアクション</div>
          <div class="next-action">
            <div class="next-action-time">10:30 — Lead A デモ実施</div>
            <div class="next-action-detail">営業パッケージと資料を準備済み</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
