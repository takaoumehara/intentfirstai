<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P5-05 Cascade Delegation Progress</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Noto Sans JP', system-ui, sans-serif;
    padding: 20px;
  }

  .phone-frame {
    width: 390px;
    height: 844px;
    background: #000;
    border-radius: 44px;
    padding: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    overflow: hidden;
    position: relative;
  }

  .phone-frame::before {
    content: '';
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 28px;
    background: #000;
    border-radius: 0 0 16px 16px;
    z-index: 10;
  }

  .phone-screen {
    width: 100%;
    height: 100%;
    background: #fdfcfa;
    border-radius: 34px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .phone-content {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
  }

  .phone-content::-webkit-scrollbar { display: none; }

  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 16px;
    font-size: 12px;
    color: #1a1816;
    background: #fdfcfa;
    padding-top: 16px;
  }

  .header {
    padding: 12px 16px 8px;
    background: #fdfcfa;
    border-bottom: 1px solid #f0ece4;
  }

  .header-title {
    font-size: 16px;
    font-weight: 600;
    color: #1a1816;
  }

  .header-subtitle {
    font-size: 12px;
    color: #8a8580;
    margin-top: 2px;
  }

  .content {
    padding: 16px 12px 20px;
  }

  /* Overall progress */
  .overall-progress {
    background: #fff;
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 14px;
    border: 1px solid #f0ece4;
  }

  .progress-title {
    font-size: 14px;
    font-weight: 600;
    color: #1a1816;
    margin-bottom: 8px;
  }

  .progress-bar {
    height: 8px;
    background: #f0ece4;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 8px;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #6889b4, #8a9cc9);
    border-radius: 4px;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #8a8580;
  }

  .progress-completion {
    font-weight: 600;
    color: #1a1816;
  }

  /* Cascade tree */
  .section-label {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    color: #8a8580;
    margin-bottom: 10px;
    margin-top: 14px;
    letter-spacing: 0.5px;
  }

  .cascade-tree {
    position: relative;
    padding-left: 24px;
  }

  /* Task node */
  .task-node {
    background: #fff;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 12px;
    border: 1.5px solid #f0ece4;
    position: relative;
  }

  .task-node::before {
    content: '';
    position: absolute;
    left: -24px;
    top: 20px;
    width: 20px;
    height: 1px;
    background: #e5e0d6;
  }

  .task-node.complete {
    border-color: #86efac;
    background: #f0fdf4;
  }

  .task-node.blocked {
    border-color: #fecaca;
    background: #fef2f2;
  }

  .task-node.in-progress {
    border-color: #fde68a;
    background: #fefce8;
  }

  .task-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .task-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    border-radius: 6px;
    font-size: 12px;
    margin-right: 8px;
    flex-shrink: 0;
  }

  .task-icon.complete {
    background: #86efac;
    color: #065f46;
  }

  .task-icon.in-progress {
    background: #fde68a;
    color: #92400e;
  }

  .task-icon.blocked {
    background: #fecaca;
    color: #b91c1c;
  }

  .task-name {
    font-size: 13px;
    font-weight: 600;
    color: #1a1816;
    flex: 1;
  }

  .task-status {
    font-size: 11px;
    font-weight: 600;
    color: #8a8580;
  }

  /* Task details */
  .task-detail {
    font-size: 11px;
    color: #8a8580;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* Progress bar inside task */
  .task-progress-bar {
    height: 6px;
    background: #f0ece4;
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 8px;
  }

  .task-progress-fill {
    height: 100%;
    background: #6889b4;
    border-radius: 3px;
  }

  .progress-percent {
    font-size: 11px;
    color: #8a8580;
    text-align: right;
  }

  /* Dependency arrow */
  .dependency-arrow {
    text-align: center;
    font-size: 14px;
    color: #6889b4;
    margin: 6px 0;
    font-weight: 600;
  }

  /* Time estimate */
  .time-estimate {
    background: #f8f7f4;
    border-radius: 12px;
    padding: 12px;
    margin-top: 14px;
    border: 1px solid #f0ece4;
  }

  .estimate-title {
    font-size: 12px;
    font-weight: 600;
    color: #1a1816;
    margin-bottom: 4px;
  }

  .estimate-text {
    font-size: 12px;
    color: #8a8580;
    line-height: 1.4;
  }

  .estimate-value {
    font-weight: 600;
    color: #1a1816;
  }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="phone-screen">
    <div class="status-bar">
      <span>11:15</span>
      <span style="font-weight: 600;">●●●●●</span>
    </div>

    <div class="header">
      <div class="header-title">ピッチ準備カスケード</div>
      <div class="header-subtitle">3つの並列タスク、依存関係あり</div>
    </div>

    <div class="phone-content">
      <div class="content">
        <!-- Overall Progress -->
        <div class="overall-progress">
          <div class="progress-title">全体進捗</div>
          <div class="progress-bar">
            <div class="progress-fill" style="width: 39%;"></div>
          </div>
          <div class="progress-info">
            <span>40/100</span>
            <span class="progress-completion">39% 完了</span>
          </div>
        </div>

        <!-- Cascade tree -->
        <div class="section-label">タスク分解</div>
        <div class="cascade-tree">

          <!-- Task 1: Research -->
          <div class="task-node in-progress">
            <div class="task-header">
              <div style="display: flex; align-items: center;">
                <div class="task-icon in-progress">⟳</div>
                <div class="task-name">競合分析</div>
              </div>
              <div class="task-status">実行中</div>
            </div>
            <div class="task-detail">
              <span>担当: リサーチエージェント</span>
            </div>
            <div class="task-progress-bar">
              <div class="task-progress-fill" style="width: 40%;"></div>
            </div>
            <div class="progress-percent">40% 完了</div>
          </div>

          <!-- Dependency arrow -->
          <div class="dependency-arrow">↓ 待機中</div>

          <!-- Task 2: Slides (blocked) -->
          <div class="task-node blocked">
            <div class="task-header">
              <div style="display: flex; align-items: center;">
                <div class="task-icon blocked">⏸</div>
                <div class="task-name">プレゼン作成</div>
              </div>
              <div class="task-status">ブロック</div>
            </div>
            <div class="task-detail">
              <span>担当: デザインエージェント</span>
            </div>
            <div class="task-progress-bar">
              <div class="task-progress-fill" style="width: 0%;"></div>
            </div>
            <div class="progress-percent">0% — 競合分析を待機中</div>
          </div>

          <!-- Task 3: Room (complete) -->
          <div class="task-node complete">
            <div class="task-header">
              <div style="display: flex; align-items: center;">
                <div class="task-icon complete">✓</div>
                <div class="task-name">会議室確保</div>
              </div>
              <div class="task-status">完了</div>
            </div>
            <div class="task-detail">
              <span>担当: 管理エージェント — 13:00 会議室予約済み</span>
            </div>
          </div>
        </div>

        <!-- Time Estimate -->
        <div class="time-estimate">
          <div class="estimate-title">推定完了時刻</div>
          <div class="estimate-text">
            リサーチ完了まで: <span class="estimate-value">あと4時間</span><br>
            プレゼン作成後: <span class="estimate-value">約16:00</span><br>
            全タスク完了: <span class="estimate-value">16:30</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
