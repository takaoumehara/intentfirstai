<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P4-06 Priority Notification — Collision Detection</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Noto Sans JP', system-ui, sans-serif;
    padding: 20px;
  }

  .phone-frame {
    width: 390px;
    height: 844px;
    background: #000;
    border-radius: 44px;
    padding: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    overflow: hidden;
    position: relative;
  }

  .phone-frame::before {
    content: '';
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 28px;
    background: #000;
    border-radius: 0 0 16px 16px;
    z-index: 10;
  }

  .phone-screen {
    width: 100%;
    height: 100%;
    background: #fdfcfa;
    border-radius: 34px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .phone-content {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
  }

  .phone-content::-webkit-scrollbar { display: none; }

  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 16px;
    font-size: 12px;
    color: #1a1816;
    background: #fdfcfa;
    padding-top: 16px;
  }

  /* Background content (meeting context) */
  .meeting-context {
    padding: 16px;
    background: #f9f8f6;
    border-bottom: 1px solid #f0ece4;
  }

  .meeting-title {
    font-size: 14px;
    font-weight: 600;
    color: #1a1816;
    margin-bottom: 8px;
  }

  .meeting-detail {
    font-size: 12px;
    color: #8a8580;
    display: flex;
    gap: 8px;
    margin-bottom: 4px;
  }

  .meeting-detail::before {
    content: '●';
    flex-shrink: 0;
    color: #6889b4;
  }

  .meeting-time-remaining {
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    color: #6889b4;
    font-weight: 600;
    margin-top: 6px;
  }

  /* Notification overlay */
  .notification-overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.4);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-top: 60px;
    z-index: 20;
  }

  .notification-card {
    background: #fff;
    border-radius: 16px;
    padding: 16px;
    width: calc(100% - 32px);
    max-width: 320px;
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.2);
    border-top: 3px solid #c1411c;
  }

  .notification-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }

  .notification-icon {
    width: 32px;
    height: 32px;
    background: #fde4e4;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .notification-caller {
    flex: 1;
  }

  .caller-name {
    font-size: 14px;
    font-weight: 600;
    color: #1a1816;
  }

  .caller-detail {
    font-size: 11px;
    color: #8a8580;
    margin-top: 1px;
  }

  .notification-time {
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    color: #c1411c;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Priority collision section */
  .priority-comparison {
    background: #f9f8f6;
    border-radius: 12px;
    padding: 12px;
    margin: 12px 0;
    border: 1px solid #f0ece4;
  }

  .comparison-title {
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    color: #8a8580;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
    font-weight: 600;
  }

  .priority-vs-container {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 10px;
    align-items: center;
  }

  .priority-item {
    background: #fff;
    border-radius: 10px;
    padding: 8px;
    border: 1px solid #e5e1d9;
  }

  .priority-item__label {
    font-size: 9px;
    font-family: 'IBM Plex Mono', monospace;
    color: #8a8580;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 4px;
  }

  .priority-item__name {
    font-size: 12px;
    font-weight: 600;
    color: #1a1816;
    line-height: 1.3;
    margin-bottom: 4px;
  }

  .priority-item__detail {
    font-size: 10px;
    color: #8a8580;
    line-height: 1.3;
  }

  .priority-badge {
    display: inline-block;
    font-size: 9px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 6px;
    margin-top: 3px;
  }

  .priority-badge.high {
    background: #c1411c;
    color: #fff;
  }

  .priority-divider {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 600;
    color: #c1411c;
    font-family: 'IBM Plex Mono', monospace;
  }

  /* Actions */
  .notification-actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 12px;
  }

  .action-btn {
    padding: 11px 12px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    border: none;
    cursor: default;
    text-align: center;
    transition: all 0.2s ease;
  }

  .action-btn--take {
    background: #30c969;
    color: #fff;
  }

  .action-btn--callback {
    background: #fef3e2;
    color: #d97706;
  }

  .action-btn--after {
    background: #f0ece4;
    color: #6889b4;
    border: 1px solid #e5e1d9;
  }

  .action-note {
    font-size: 10px;
    color: #8a8580;
    text-align: center;
    margin-top: 10px;
    line-height: 1.4;
  }

  .action-note strong {
    color: #1a1816;
    font-weight: 600;
  }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="phone-screen">
    <div class="status-bar">
      <span>15:30</span>
      <span style="font-weight: 600;">●●●●●</span>
    </div>

    <!-- Background: In-meeting context (partially visible) -->
    <div class="phone-content">
      <div class="meeting-context">
        <div class="meeting-title">客先ミーティング</div>
        <div class="meeting-detail">クライアント案件相談</div>
        <div class="meeting-detail">残り時間: 28分</div>
        <div class="meeting-time-remaining">15:30 — 16:00</div>
      </div>
    </div>

    <!-- Notification overlay -->
    <div class="notification-overlay">
      <!-- Notification card -->
      <div class="notification-card">

        <!-- Caller info -->
        <div class="notification-header">
          <div class="notification-icon">📞</div>
          <div class="notification-caller">
            <div class="caller-name">山本営業</div>
            <div class="caller-detail">Hot Lead — Toyota (VIP)</div>
          </div>
          <div class="notification-time">NOW</div>
        </div>

        <!-- Priority collision -->
        <div class="priority-comparison">
          <div class="comparison-title">優先度判定</div>
          <div class="priority-vs-container">
            <!-- Current: In meeting -->
            <div class="priority-item">
              <div class="priority-item__label">現在</div>
              <div class="priority-item__name">客先ミーティング</div>
              <div class="priority-item__detail">
                残り: 28分
              </div>
              <div class="priority-badge high">High</div>
            </div>

            <!-- VS divider -->
            <div class="priority-divider">VS</div>

            <!-- Incoming: Sales manager call -->
            <div class="priority-item">
              <div class="priority-item__label">着信</div>
              <div class="priority-item__name">営業マネージャー</div>
              <div class="priority-item__detail">
                案件: Toyota (VIP)<br>
                見込: 決定権者
              </div>
              <div class="priority-badge high">High</div>
            </div>
          </div>
        </div>

        <!-- AI analysis note -->
        <div class="action-note">
          <strong>両者とも優先度が高い。</strong>判断はあなたに。
        </div>

        <!-- Action buttons -->
        <div class="notification-actions">
          <button class="action-btn action-btn--take">取る</button>
          <button class="action-btn action-btn--callback">5分後に折り返す</button>
          <button class="action-btn action-btn--after">後で確認</button>
        </div>

      </div>
    </div>

  </div>
</div>
</body>
</html>
