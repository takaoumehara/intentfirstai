<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P4-03 Desktop Full CRM View</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Noto Sans JP', system-ui, sans-serif;
    padding: 20px;
  }

  .phone-frame {
    width: 390px;
    height: 844px;
    background: #000;
    border-radius: 44px;
    padding: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    overflow: hidden;
    position: relative;
  }

  .phone-frame::before {
    content: '';
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 28px;
    background: #000;
    border-radius: 0 0 16px 16px;
    z-index: 10;
  }

  .phone-screen {
    width: 100%;
    height: 100%;
    background: #fdfcfa;
    border-radius: 34px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .phone-content {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
  }

  .phone-content::-webkit-scrollbar { display: none; }

  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 16px;
    font-size: 12px;
    color: #1a1816;
    background: #fdfcfa;
    padding-top: 16px;
  }

  .header {
    padding: 12px 16px 8px;
    background: #fdfcfa;
    border-bottom: 1px solid #f0ece4;
    position: sticky;
    top: 0;
    z-index: 5;
  }

  .header-title {
    font-size: 16px;
    font-weight: 600;
    color: #1a1816;
  }

  .header-subtitle {
    font-size: 12px;
    color: #8a8580;
    margin-top: 2px;
  }

  .content {
    padding: 12px 12px 20px;
  }

  .opportunity-card {
    background: #fff;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 10px;
    border: 1px solid #f0ece4;
    position: relative;
  }

  .opportunity-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
  }

  .opportunity-name {
    font-size: 14px;
    font-weight: 600;
    color: #1a1816;
  }

  .opportunity-stage {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    color: #fff;
    background: #6889b4;
    padding: 3px 8px;
    border-radius: 12px;
  }

  .opportunity-stage.closed {
    background: #8a6ab0;
  }

  .opportunity-stage.negotiation {
    background: #a07040;
  }

  .opportunity-amount {
    font-size: 13px;
    font-weight: 600;
    color: #1a1816;
    font-family: 'IBM Plex Mono', monospace;
    margin-bottom: 2px;
  }

  .opportunity-details {
    font-size: 11px;
    color: #8a8580;
    margin-bottom: 8px;
    display: flex;
    gap: 12px;
  }

  .detail-item {
    display: flex;
    gap: 4px;
  }

  .confidence-bar {
    height: 6px;
    background: #f0ece4;
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 6px;
  }

  .confidence-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.3s ease;
  }

  .opportunity-card:nth-child(1) .confidence-fill {
    width: 78%;
    background: linear-gradient(90deg, #c1411c, #e74c3c);
  }

  .opportunity-card:nth-child(2) .confidence-fill {
    width: 52%;
    background: linear-gradient(90deg, #d97706, #f59e0b);
  }

  .opportunity-card:nth-child(3) .confidence-fill {
    width: 31%;
    background: linear-gradient(90deg, #0369a1, #0ea5e9);
  }

  .confidence-label {
    font-size: 11px;
    color: #8a8580;
    display: flex;
    justify-content: space-between;
  }

  .footer-note {
    font-size: 10px;
    color: #c9c4bc;
    padding: 8px 12px;
    text-align: center;
    border-top: 1px solid #f0ece4;
  }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="phone-screen">
    <div class="status-bar">
      <span>10:00</span>
      <span style="font-weight: 600;">●●●●●</span>
    </div>

    <div class="header">
      <div class="header-title">CRM Dashboard</div>
      <div class="header-subtitle">10:00 Standup (全データ表示)</div>
    </div>

    <div class="phone-content">
      <div class="content">
        <!-- Opportunity 1: Negotiation -->
        <div class="opportunity-card">
          <div class="opportunity-header">
            <div class="opportunity-name">Enterprise Platform</div>
            <div class="opportunity-stage negotiation">交渉中</div>
          </div>
          <div class="opportunity-amount">¥4,500,000</div>
          <div class="opportunity-details">
            <div class="detail-item">
              <span>Sony Group</span>
            </div>
            <div class="detail-item">
              <span>4月28日</span>
            </div>
          </div>
          <div class="confidence-bar">
            <div class="confidence-fill"></div>
          </div>
          <div class="confidence-label">
            <span>勝率</span>
            <span>78%</span>
          </div>
        </div>

        <!-- Opportunity 2: Evaluation -->
        <div class="opportunity-card">
          <div class="opportunity-header">
            <div class="opportunity-name">Mobile Integration Suite</div>
            <div class="opportunity-stage">評価中</div>
          </div>
          <div class="opportunity-amount">¥2,100,000</div>
          <div class="opportunity-details">
            <div class="detail-item">
              <span>Toyota Corp</span>
            </div>
            <div class="detail-item">
              <span>5月15日</span>
            </div>
          </div>
          <div class="confidence-bar">
            <div class="confidence-fill"></div>
          </div>
          <div class="confidence-label">
            <span>勝率</span>
            <span>52%</span>
          </div>
        </div>

        <!-- Opportunity 3: Early -->
        <div class="opportunity-card">
          <div class="opportunity-header">
            <div class="opportunity-name">Analytics Framework</div>
            <div class="opportunity-stage">初期検討</div>
          </div>
          <div class="opportunity-amount">¥850,000</div>
          <div class="opportunity-details">
            <div class="detail-item">
              <span>Mitsubishi Heavy</span>
            </div>
            <div class="detail-item">
              <span>6月2日</span>
            </div>
          </div>
          <div class="confidence-bar">
            <div class="confidence-fill"></div>
          </div>
          <div class="confidence-label">
            <span>勝率</span>
            <span>31%</span>
          </div>
        </div>
      </div>
    </div>

    <div class="footer-note">
      フル機能モード • すべてのデータ表示
    </div>
  </div>
</div>
</body>
</html>
