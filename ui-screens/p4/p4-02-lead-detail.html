<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P4-02 Lead Detail</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Noto Sans JP', system-ui, sans-serif;
    padding: 20px;
  }

  .phone-frame {
    width: 390px;
    height: 844px;
    background: #000;
    border-radius: 44px;
    padding: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    overflow: hidden;
    position: relative;
  }

  .phone-frame::before {
    content: '';
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 28px;
    background: #000;
    border-radius: 0 0 16px 16px;
    z-index: 10;
  }

  .phone-screen {
    width: 100%;
    height: 100%;
    background: #fdfcfa;
    border-radius: 34px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .phone-content {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
  }

  .phone-content::-webkit-scrollbar { display: none; }

  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 16px;
    font-size: 12px;
    color: #1a1816;
    background: #fdfcfa;
    padding-top: 16px;
  }

  .header {
    padding: 12px 16px 8px;
    background: #fdfcfa;
    border-bottom: 1px solid #f0ece4;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .back-btn {
    font-size: 20px;
    cursor: pointer;
    color: #1a1816;
  }

  .header-text {
    flex: 1;
  }

  .header-title {
    font-size: 16px;
    font-weight: 600;
    color: #1a1816;
  }

  .header-company {
    font-size: 12px;
    color: #8a8580;
    margin-top: 1px;
  }

  .content {
    padding: 16px 12px 20px;
  }

  .section {
    margin-bottom: 16px;
  }

  .section-title {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    color: #8a8580;
    margin-bottom: 8px;
    letter-spacing: 0.5px;
  }

  .signal-item {
    background: #fff;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 8px;
    border: 1px solid #f0ece4;
    display: flex;
    gap: 8px;
  }

  .signal-icon {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .signal-icon.engagement {
    background: #fef3e2;
    color: #d97706;
  }

  .signal-icon.budget {
    background: #fde4e4;
    color: #c1411c;
  }

  .signal-icon.timeline {
    background: #e0f2fe;
    color: #0369a1;
  }

  .signal-content {
    flex: 1;
  }

  .signal-name {
    font-size: 13px;
    font-weight: 600;
    color: #1a1816;
    margin-bottom: 2px;
  }

  .signal-detail {
    font-size: 12px;
    color: #8a8580;
    line-height: 1.3;
  }

  .stat-row {
    background: #fff;
    border-radius: 12px;
    padding: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 1px solid #f0ece4;
    margin-bottom: 8px;
  }

  .stat-label {
    font-size: 12px;
    color: #8a8580;
  }

  .stat-value {
    font-size: 14px;
    font-weight: 600;
    color: #1a1816;
    font-family: 'IBM Plex Mono', monospace;
  }

  .action-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 16px;
  }

  .btn {
    padding: 12px 16px;
    border-radius: 12px;
    border: none;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .btn-primary {
    background: #6889b4;
    color: #fff;
  }

  .btn-secondary {
    background: #f0ece4;
    color: #1a1816;
  }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="phone-screen">
    <div class="status-bar">
      <span>9:41</span>
      <span style="font-weight: 600;">●●●●●</span>
    </div>

    <div class="header">
      <div class="back-btn">←</div>
      <div class="header-text">
        <div class="header-title">Sony Engineering</div>
        <div class="header-company">信頼度 89%</div>
      </div>
    </div>

    <div class="phone-content">
      <div class="content">
        <div class="section">
          <div class="section-title">証拠シグナル</div>

          <div class="signal-item">
            <div class="signal-icon engagement">📧</div>
            <div class="signal-content">
              <div class="signal-name">メール反応度</div>
              <div class="signal-detail">過去5通中4通を24時間以内に返信</div>
            </div>
          </div>

          <div class="signal-item">
            <div class="signal-icon budget">💰</div>
            <div class="signal-content">
              <div class="signal-name">予算確保状況</div>
              <div class="signal-detail">Q2予算の30%が承認済み・確保中</div>
            </div>
          </div>

          <div class="signal-item">
            <div class="signal-icon timeline">📅</div>
            <div class="signal-content">
              <div class="signal-name">決定予定日</div>
              <div class="signal-detail">4月30日までに決定予定（公開情報）</div>
            </div>
          </div>
        </div>

        <div class="section">
          <div class="section-title">統計</div>

          <div class="stat-row">
            <span class="stat-label">提案から返信まで</span>
            <span class="stat-value">16h 22m</span>
          </div>

          <div class="stat-row">
            <span class="stat-label">最後の接触</span>
            <span class="stat-value">昨日 15:30</span>
          </div>

          <div class="stat-row">
            <span class="stat-label">接触回数（30日）</span>
            <span class="stat-value">8回</span>
          </div>
        </div>

        <div class="section">
          <div class="section-title">推奨アクション</div>
          <div class="action-buttons">
            <button class="btn btn-primary">メール送信</button>
            <button class="btn btn-secondary">通話予約</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
